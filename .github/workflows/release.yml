name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    uses: ./.github/workflows/test.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and package
        run: ./scripts/build-in-docker.sh --cmake-build-type Release share

      - name: Create release archive
        run: |
          version="${GITHUB_REF_NAME#v}"
          archive="libs2client-${version}-linux-amd64.tar.gz"
          tar -czf "$archive" -C build/share .
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.ARCHIVE }}
            build/share/libs2client.so
            build/share/s2_client_extern.h
            build/share/chunk_extern.h
            build/share/hdat_write_extern.h
