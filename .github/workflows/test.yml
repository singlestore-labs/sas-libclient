name: Test

on:
  pull_request:
  push:
    branches:
      - master
  workflow_call:

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Start SingleStore
        run: ./scripts/s2-docker.sh start

      - name: Run C tests
        run: ./scripts/test-in-docker.sh test

      - name: Run C++ tests
        run: ./scripts/test-in-docker.sh testcc

      - name: Stop SingleStore
        if: always()
        run: ./scripts/s2-docker.sh stop
